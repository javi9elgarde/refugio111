<!DOCTYPE html>
<html lang="es" data-mt-cat="peliculas">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="logonavegador.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e63946">
  <title>Refugio 111 — Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mt-styles.css?v=20260606h">
  <style>
    /* ── MODAL AÑADIR AL REGISTRO ──────────────────────── */
    .mt-add-search-row { display:flex; gap:0.6rem; margin-bottom:1rem; }
    .mt-add-search-row .mt-search { flex:1; padding:0.6rem 1rem; font-size:0.9rem; }
    .mt-add-results { display:flex; flex-direction:column; gap:0.4rem; max-height:300px; overflow-y:auto; }
    .mt-add-result {
      display:flex; gap:0.75rem; align-items:center;
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:10px; padding:0.55rem 0.8rem; cursor:pointer;
      transition:background 0.14s, border-color 0.14s;
    }
    .mt-add-result:hover { background:rgba(255,255,255,0.07); border-color:var(--accent); }
    .mt-add-result__poster {
      width:42px; height:60px; border-radius:5px; object-fit:cover;
      flex-shrink:0; background:rgba(255,255,255,0.05);
    }
    .mt-add-result__title { font-weight:700; font-size:0.9rem; color:var(--txt1); margin-bottom:0.15rem; }
    .mt-add-result__meta  { font-size:0.73rem; color:var(--txt3); }
    .mt-add-preview {
      display:flex; gap:1rem; align-items:flex-start;
      background:rgba(255,255,255,0.025); border-radius:12px; padding:0.85rem;
    }
    .mt-add-preview__poster {
      width:58px; height:82px; border-radius:6px; object-fit:cover;
      flex-shrink:0; background:rgba(255,255,255,0.05);
    }
    .mt-add-preview__title { font-weight:700; font-size:0.95rem; color:var(--txt1); margin-bottom:0.3rem; }
    .mt-add-preview__meta  { font-size:0.75rem; color:var(--txt2); line-height:1.5; }
    .mt-add-back { background:none; border:none; color:var(--txt3); font-size:0.78rem; cursor:pointer; padding:0.25rem 0; margin-bottom:0.75rem; display:none; }
    .mt-add-back:hover { color:var(--txt1); }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="mtLoading">
  <div class="mt-loading__brand" id="mtLoadingBrand">🎬 REFUGIO 111</div>
  <div class="mt-loading__dots">
    <div class="mt-loading__dot"></div>
    <div class="mt-loading__dot"></div>
    <div class="mt-loading__dot"></div>
  </div>
  <div class="mt-loading__sub">Cargando registro...</div>
</div>

<!-- ── NAVEGACIÓN ─────────────────────────────────────────── -->
<nav class="mt-nav">
  <a href="hub.html" class="mt-nav__hub">🏠 Hub</a>

  <div class="mt-cat-tabs">
    <button class="mt-cat-tab mt-cat-tab--active" data-cat="peliculas">🎬 <span class="label">Películas</span></button>
    <button class="mt-cat-tab" data-cat="series">📺 <span class="label">Series</span></button>
    <button class="mt-cat-tab" data-cat="anime">🌸 <span class="label">Anime</span></button>
  </div>

  <div class="mt-nav__links">
    <a href="mt-biblioteca.html"  class="mt-nav__link">Biblioteca</a>
    <a href="mt-registro.html"    class="mt-nav__link mt-nav__link--active">Registro</a>
    <a href="mt-pendientes.html"  class="mt-nav__link">Pendientes</a>
  </div>

  <a href="mt-hub.html" class="mt-nav__player-pill" id="mtPlayerPill" title="Cambiar jugador">
    <div class="mt-nav__player-avatar mt-nav__player-avatar--javi">J</div>
    <span class="mt-player-pill-name">Javi</span>
  </a>

  <button class="mt-nav__hamburger" id="mtHamburger" aria-label="Menú">☰</button>
</nav>
<div class="mt-accent-bar" id="mtAccentBar"></div>

<!-- ── CONTENIDO ──────────────────────────────────────────── -->
<div class="mt-page">

  <div class="mt-page-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
    <div>
      <h1 class="mt-page-header__title" id="pageTitle">Registro · Películas</h1>
      <p class="mt-page-header__sub" id="pageCount">Cargando...</p>
    </div>
    <button class="mt-btn mt-btn--primary" id="btnAddTitle" style="flex-shrink:0;white-space:nowrap">+ Añadir</button>
  </div>

  <!-- Filtros -->
  <div class="mt-filters">
    <div class="mt-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="mt-search" id="searchInput" placeholder="Buscar título, director, estudio...">
    </div>
    <select class="mt-select" id="statusFilter">
      <option value="">▶ Estado</option>
      <option value="visto">Visto / Terminado</option>
      <option value="viendo">Viendo</option>
      <option value="pendiente">Pendiente</option>
      <option value="pausado">Pausado</option>
      <option value="abandonado">Abandonado</option>
    </select>
    <select class="mt-select" id="yearFilter"><option value="">📅 Año</option></select>
    <button class="mt-btn mt-btn--ghost mt-btn--sm" id="clearFilters" title="Limpiar filtros">✕</button>
  </div>

  <!-- Grid de tarjetas -->
  <div class="mt-grid" id="mtGrid"></div>

</div>

<!-- ════════════════════════════════════════════
     MODAL: AÑADIR AL REGISTRO
═══════════════════════════════════════════════ -->
<div class="mt-modal-overlay" id="addModal">
  <div class="mt-modal" style="max-width:520px">
    <div class="mt-modal__header">
      <h2 class="mt-modal__title" id="addModalTitle">Añadir al registro</h2>
      <button class="mt-modal__close" id="addModalClose">✕</button>
    </div>
    <div class="mt-modal__body">

      <!-- Paso 1: Buscar -->
      <div id="addStep1">
        <div class="mt-add-search-row">
          <input type="text" class="mt-search" id="addSearchInput" placeholder="Buscar título...">
          <button class="mt-btn mt-btn--primary mt-btn--sm" id="addSearchBtn">🔍 Buscar</button>
        </div>
        <div id="addSearchResults" class="mt-add-results"></div>
      </div>

      <!-- Paso 2: Estado + nota -->
      <div id="addStep2" style="display:none">
        <button class="mt-add-back" id="addBackBtn">← Cambiar selección</button>
        <div id="addItemPreview" class="mt-add-preview"></div>
        <div class="mt-player-rows" id="addPlayerRow" style="margin-top:1rem"></div>
      </div>

      <!-- Paso 3: Guardando -->
      <div id="addStep3" style="display:none;text-align:center;padding:2.5rem 1rem">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">⏳</div>
        <div style="color:var(--txt2);font-size:0.85rem;letter-spacing:0.08em">Guardando...</div>
      </div>

      <!-- Paso 4: Listo -->
      <div id="addStep4" style="display:none;text-align:center;padding:2.5rem 1rem">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">✅</div>
        <div style="color:#43e97b;font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:900;letter-spacing:0.08em;margin-bottom:0.4rem">¡Añadido al registro!</div>
        <div id="addDoneText" style="color:var(--txt3);font-size:0.78rem"></div>
      </div>

    </div>
    <div class="mt-modal__footer" id="addFooter">
      <button class="mt-btn mt-btn--secondary" id="addCancel">Cancelar</button>
      <button class="mt-btn mt-btn--primary" id="addSave" style="display:none">✔ Guardar</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     MODAL: REGISTRAR ESTADO / NOTA
═══════════════════════════════════════════════ -->
<div class="mt-modal-overlay" id="regModal">
  <div class="mt-modal" style="max-width:480px">
    <div class="mt-modal__header">
      <h2 class="mt-modal__title" id="regModalTitle">Registrar</h2>
      <button class="mt-modal__close" id="regModalClose">✕</button>
    </div>
    <div class="mt-modal__body">
      <div class="mt-player-rows" id="regPlayerRows"></div>
    </div>
    <div class="mt-modal__footer">
      <button class="mt-btn mt-btn--secondary" id="regCancel">Cancelar</button>
      <button class="mt-btn mt-btn--primary"   id="regSave">Guardar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"       defer></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" defer></script>
<script src="firebase-config.js?v=20260521c" defer></script>
<script src="mt-main.js?v=20260606a"         defer></script>
<script src="mt-registro.js?v=20260607a"     defer></script>
</body>
</html>
