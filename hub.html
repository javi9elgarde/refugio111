<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="64x64" href="logonavegador.png">
  <link rel="icon" type="image/png" sizes="512x512" href="logonuevo.png">
  <link rel="apple-touch-icon" href="logonuevo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refugio 111 — Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hub.css?v=20260607c">
</head>
<body>

<div id="hub">

  <!-- Split background image — archivos separados, diagonal medida al píxel -->
  <div class="hub__split">
    <img src="hub-left.png"  class="hub__split-img hub__split-img--left"  alt="Videojuegos" draggable="false">
    <img src="hub-right.png" class="hub__split-img hub__split-img--right" alt="Cine y Series" draggable="false">
  </div>

  <!-- Atmospheric color overlays -->
  <div class="hub__bg-left"  id="bgLeft"></div>
  <div class="hub__bg-right" id="bgRight"></div>

  <!-- Dim overlay for inactive side -->
  <div class="hub__dim-left"  id="dimLeft"></div>
  <div class="hub__dim-right" id="dimRight"></div>

  <!-- Scanlines retro overlay -->
  <div class="hub__scanlines"></div>

  <!-- Particle canvas -->
  <canvas id="hubCanvas" class="hub__canvas"></canvas>

  <!-- Neon vignette edge glow -->
  <div class="hub__vignette" id="hubVignette"></div>

  <!-- Click/hover zones (encima de todo excepto UI) -->
  <div class="hub__zone hub__zone--left"  id="zoneLeft"></div>
  <div class="hub__zone hub__zone--right" id="zoneRight"></div>

  <!-- Línea divisoria central -->
  <div class="hub__divider"></div>

  <!-- Título central flotante -->
  <div class="hub__title" id="hubTitle">
    <span class="hub__title-spark hub__title-spark--a">✦</span>
    <div class="hub__title-main">
      <span class="hub__title-el">EL HUB</span>
      <span class="hub__title-friki">FRIKI</span>
    </div>
    <span class="hub__title-spark hub__title-spark--b">✦</span>
  </div>

  <!-- Label izquierdo — Videojuegos -->
  <div class="hub__label hub__label--left" id="labelLeft">
    <div class="hub__label-name">VIDEOJUEGOS</div>
    <div class="hub__label-enter">
      <span class="hub__label-arrow">▶</span> ENTRAR
    </div>
  </div>

  <!-- Label derecho — Cine / Series / Anime -->
  <div class="hub__label hub__label--right" id="labelRight">
    <div class="hub__label-name">PELÍCULAS · SERIES · ANIME</div>
    <div class="hub__label-enter">
      <span class="hub__label-arrow">▶</span> ENTRAR
    </div>
  </div>

  <!-- Overlay flash en click -->
  <div class="hub__flash" id="hubFlash"></div>

  <!-- ── CHARACTER SELECTION ────────────────────────── -->
  <div class="psel" id="pselOverlay">
    <div class="psel__scanlines"></div>
    <button class="psel__back" id="pselBack">← VOLVER</button>
    <div class="psel__header">
      <div class="psel__eyebrow">GAMETRACKER · VIDEOJUEGOS</div>
      <h2 class="psel__title">¿QUIÉN JUEGA?</h2>
      <p class="psel__sub">Selecciona tu perfil para continuar</p>
    </div>
    <div class="psel__cards">
      <div class="psel__card psel__card--david" data-player="David">
        <div class="psel__glow"></div>
        <div class="psel__img-wrap">
          <img src="icondavidneutral.png" class="psel__img" alt="David" draggable="false">
        </div>
        <div class="psel__name">DAVID</div>
        <div class="psel__fullname">David Garde</div>
      </div>
      <div class="psel__card psel__card--javi" data-player="Javi">
        <div class="psel__glow"></div>
        <div class="psel__img-wrap">
          <img src="iconjavineutral.png" class="psel__img" alt="Javi" draggable="false">
        </div>
        <div class="psel__name">JAVI</div>
        <div class="psel__fullname">Javier Garde</div>
      </div>
      <div class="psel__card psel__card--mery" data-player="Mery">
        <div class="psel__glow"></div>
        <div class="psel__img-wrap">
          <img src="iconmeryneutral.png" class="psel__img" alt="Mery" draggable="false">
        </div>
        <div class="psel__name">MERY</div>
        <div class="psel__fullname">Mariam Moreno</div>
      </div>
    </div>
    <div class="psel__flash" id="pselFlash"></div>
  </div>

</div>

<script src="hub.js?v=20260606a"></script>
</body>
</html>
